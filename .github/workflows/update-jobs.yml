name: Auto Update Jobs Daily

on:
  schedule:
    # Runs at 8:30 PM UTC = 2:00 AM IST every day
    - cron: '30 20 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest jobs via OpenRouter AI
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/fetch-jobs.mjs

      - name: Check if jobData.ts changed
        id: check_changes
        run: |
          git diff --quiet src/lib/jobData.ts && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated jobs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "Rozgar Sathi Bot"
          git config user.email "rozgar-bot@users.noreply.github.com"
          git add src/lib/jobData.ts
          git commit -m "chore: auto-update job listings [$(date +'%Y-%m-%d')]"
          git push

      - name: Trigger site rebuild
        if: steps.check_changes.outputs.changed == 'true'
        run: echo "Job data updated — deploy workflow will auto-trigger on push"

      - name: No changes
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No job data changes today"
