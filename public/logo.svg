<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="briefcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.3" />

  <!-- Briefcase body -->
  <rect x="42" y="82" width="116" height="80" rx="10" ry="10" fill="url(#briefcaseGrad)" />

  <!-- Briefcase handle -->
  <path d="M74 82 L74 70 Q74 60 84 60 L116 60 Q126 60 126 70 L126 82"
        fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center clasp -->
  <rect x="88" y="116" width="24" height="14" rx="4" fill="#f97316" />
  <rect x="94" y="120" width="12" height="6" rx="2" fill="#ffffff" fill-opacity="0.8" />

  <!-- Horizontal divider line on briefcase -->
  <line x1="42" y1="118" x2="158" y2="118" stroke="#1d4ed8" stroke-width="2.5" stroke-opacity="0.25" />

  <!-- Star accent top-right -->
  <circle cx="158" cy="48" r="14" fill="#f97316" fill-opacity="0.9" />
  <text x="158" y="53" text-anchor="middle" font-size="14" fill="#ffffff">★</text>
</svg>
